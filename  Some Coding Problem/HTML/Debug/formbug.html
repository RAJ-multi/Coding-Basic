<!-- question: The following HTML code is supposed to create a simple contact form, but it contains a bug that prevents the
form from submitting correctly. Identify and fix the bug. -->

<!DOCTYPE html>
<html>

<head>
    <title>Form Test</title>
</head>

<body>

    <h2>Contact Form</h2>

    <form action="submit.html">
        <label>Full Name</label>
        <input type="text" id="name">

        <label>Email</label>
        <input type="email" id="email">

        <button>Submit</button>
    </form>

</body>

</html>


<!-- answer: The bug in the code is that the `<button>` element does not have a `type` attribute specified. By default, a
    button inside a form is treated as a submit button, but it is good practice to explicitly set the type to "submit"
    to ensure that the form submits correctly. To fix the bug, change the button element to: -->

<!DOCTYPE html>
<html>

<head>
    <title>Form Test</title>
</head>

<body>

    <h2>Contact Form</h2>

    <form action="https://formsubmit.co/rajsen1016@email.com" method="POST">
        <label>Full Name</label>
        <input type="text" id="name" name="name" required>

        <label>Email</label>
        <input type="email" id="email" name="email" required>

        <button type="submit" value="submit">Submit</button>
    </form>

</body>

</html>
