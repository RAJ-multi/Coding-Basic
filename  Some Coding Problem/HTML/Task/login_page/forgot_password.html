<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
</head>

<body style="background-color: black;">
    <center
        style="margin: 100px; border: 1px solid rgb(244, 2, 2);width: 300px; padding: 20px; background-color: white; border-radius: 10px;">
        <div class="forgot-password-container "">
            <h2>Forgot Password</h2>
            <h3>Enter your email to receive a password reset link.</h3>
            <form action=" /api/request-reset" method="POST">
            <label for="user-email">Email Address:</label>
            <input type="email" id="user-email" name="email" placeholder="example@mail.com" required> <br><br>
            <button type="submit">Send Reset Link</button>
            </form> <br>
            <div class="links">
                <a href="login_page.html">Back to Login</a>
            </div>
        </div>
    </center>
</body>

</html>
