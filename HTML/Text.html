<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        em {
            color: blue;
            font-style: normal;
        }
    </style>
</head>

<body>
    <p> I love to learn <em>HTML</em> and <em>CSS</em></p>
    <p><i>Pritom Sen Raj</i></p>
    <p><strong>Strong text</strong></p>
    <p><b>Bold text</b></p>
    <h1>This is heading 1</h1>
    <h2>This is heading 2</h2> <br>
    <abbr title="This is an abbreviation">Abbr used for abbreviation</abbr> <br>
    <strike>Strikethrough text</strike> <br>
    <!-- this is used to show deleted text -->
    <!-- <strike> is used in old html but is deprecated and now in modern time maximum use <del> and <s> -->
    <del>Deleted text</del> <br>
    <s>Strikethrough text</s> <br>
    <mark>Marked text</mark> <br>
    <blockquote>This is a blockquote</blockquote> <br>
    <q>This is a quote</q> <br>
    Click <code>submit</code> <button></button> <br>
    <samp>Sample output of a command:
        <a href="https://www.google.com">Google</a>
    </samp> <br> <!-- <code> is used to show code and <samp> is used to show sample output of a command -->
    <kbd>Ctrl + C</kbd> <br> <!-- <kbd> is used to show keyboard input -->
</body>

</html>
