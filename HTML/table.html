<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Digital - Admission Data</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            /* This makes the borders look much cleaner than cellspacing */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px 0;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }

        th {
            background-color: rgb(42, 165, 42);
            color: white;
            padding: 15px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
        }

        /* Zebra Striping (Automatic alternating colors) */
        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        /* Hover effect */
        tbody tr:hover {
            background-color: #d1ffd1;
            /* Light green highlight on hover */
            cursor: pointer;
            transition: 0.3s;
        }

        .total_GPA {
            color: #2e7d32;
            font-weight: bold;
        }

        .fail {
            color: #d32f2f;
            font-weight: bold;
            background-color: #ffebee;
            /* Light red background for failed rows */
        }

        /* Styling the caption */
        caption {
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #333;
            color: white;
            border-radius: 10px 10px 0 0;
        }

        /* Footer styling */
        tfoot {
            background-color: #333;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div style="padding: 20px;">
        <table>
            <caption>Daily Admission Application Summary</caption>

            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Age</th>
                    <th>Latest Qualification</th>
                    <th>Previous Qualification</th>
                    <th>Combined GPA</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>John</td>
                    <td>20</td>
                    <td>HSC</td>
                    <td>SSC</td>
                    <td class="total_GPA">8.5</td>
                </tr>
                <tr>
                    <td>Smith</td>
                    <td>22</td>
                    <td>HSC</td>
                    <td>SSC</td>
                    <td class="total_GPA">8.0</td>
                </tr>
                <tr>
                    <td>David</td>
                    <td>21</td>
                    <td>HSC</td>
                    <td>SSC</td>
                    <td class="total_GPA">10.0</td>
                </tr>
                <tr class="fail">
                    <td>Michael</td>
                    <td>23</td>
                    <td>HSC</td>
                    <td>SSC</td>
                    <td>4.0</td>
                </tr>
            </tbody>

            <tfoot>
                <tr>
                    <td colspan="4" style="text-align: right;">Total Applicants Processed:</td>
                    <td>4</td>
                </tr>
            </tfoot>
        </table>
    </div>
</body>

</html>
